services:

  # =========================
  # PostgreSQL (for Nessie)
  # =========================
  postgres:
    image: postgres:17-alpine
    container_name: nessie-postgres
    environment:
      POSTGRES_USER: nessie
      POSTGRES_PASSWORD: nessie
      POSTGRES_DB: nessie
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # =========================
  # Apache Nessie
  # =========================
  nessie:
    image: ghcr.io/projectnessie/nessie:0.94.4
    container_name: nessie
    depends_on:
      - postgres
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/nessie
      QUARKUS_DATASOURCE_USERNAME: nessie
      QUARKUS_DATASOURCE_PASSWORD: nessie
      QUARKUS_HTTP_PORT: 19120
      NESSIE_VERSION_STORE_TYPE: JDBC
    ports:
      - "19120:19120"

  # =========================
  # MinIO (S3-compatible storage)
  # =========================
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # =========================
  # Trino
  # =========================
  trino:
    image: trinodb/trino:443
    container_name: trino
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc:/etc/trino
    depends_on:
      - minio
      - nessie
volumes:
  postgres_data:
  minio_data: